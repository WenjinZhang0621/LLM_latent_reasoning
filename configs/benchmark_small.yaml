project:
  name: sae_latent_reasoning_microbenchmark
  seed: 0
  output_dir: results/benchmark_small

data:
  raw_path: data/raw/math_problems_small.jsonl
  cots_path: results/benchmark_small/cots.jsonl
  token_features_path: results/benchmark_small/token_features_layer18_topk50.jsonl
  sample_features_path: results/benchmark_small/sample_features_layer18_topk50.npz
  sample_metadata_path: results/benchmark_small/sample_metadata_layer18_topk50.jsonl
  selected_X_path: results/benchmark_small/selected_X_J20.npz
  selected_features_path: results/benchmark_small/selected_features_J20.json

lmstudio:
  base_url: http://127.0.0.1:1234/v1
  api_key: lm-studio
  model: qwen/qwen3-8b
  temperature: 0.2
  top_p: 0.95
  max_tokens: 512
  max_tokens_by_dataset:
    math500: 1024
  timeout_seconds: 900
  seed: 0

model:
  name: Qwen/Qwen3-8B-Base
  generation_name: qwen/qwen3-8b
  dtype: bfloat16
  device: cuda
  layer: 18
  max_new_tokens: 512
  math_max_new_tokens: 1024
  temperature: 0.2
  top_p: 0.95

sae:
  model_name: Qwen/Qwen3-8B-Base
  sae_repo: Qwen/SAE-Res-Qwen3-8B-Base-W64K-L0_50
  repo: Qwen/SAE-Res-Qwen3-8B-Base-W64K-L0_50
  layer: 18
  top_k: 50
  d_sae: 65536
  token_chunk_size: 128
  forward_chunk_size: 512
  extraction_text: reasoning_only
  sample_aggregation: all_token_mean
  device: cuda
  dtype: bfloat16

dcrl:
  selected_X_path: results/benchmark_small/selected_X_J20.npz
  selected_features_path: results/benchmark_small/selected_features_J20.json
  fits_dir: results/benchmark_small/fits
  model_selection_path: results/benchmark_small/model_selection.csv
  J: 20
  min_firing_rate: 0.03
  max_firing_rate: 0.80
  max_abs_corr: 0.90
  relaxed_max_abs_corr: 0.95
  K_grid: [3]
  seeds: [0]
  max_iter: 25
  tol: 1.0e-4
  ridge: 1.0e-4
  l1_gate: [0.005]
  l1_mag: [0.005]
  initialization: varimax_q
  gate_threshold: [0.7]
  mag_threshold: [0.7]
  proximal_lr_gate: [0.05]
  proximal_lr_mag: [0.05]

steering:
  coefficients: [16, 64, 96]
  max_new_tokens: 64
  examples_per_side: 4
  layer: 18

benchmark:
  num_generation_prompts: 20
  num_activation_traces: 10
  num_steering_prompts: 5
  steering_coefficients: [16, 64, 96]
